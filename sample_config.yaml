monitoring:
  # Global whitelist of containers allowed for restart operations (comma or space separated)
  # Only containers listed here can be restarted via API or healthcheck monitors
  allowedrestartcontainers: "web-app, api-server, worker, database"
  disk:
    root:
      icon: hdd
      path: /
      threshold: 80
    home:
      icon: hdd
      path: /home
      threshold: 80
  healthcheck:
    google:
      icon: activity
      timeout: 10
      url: https://google.com
    local:
      icon: heart-pulse
      timeout: 10
      url: http://localhost:8080/healthz
  docker:
    app_containers:
      icon: box
      containers: "web-app, api-server, worker"
      threshold: 5
  interval: 60
  system:
    cpu:
      icon: cpu
      threshold: 85
    memory:
      icon: speedometer
      threshold: 85
    title: lmon Dashboard
web:
  host: 0.0.0.0
  port: 8080
webhook:
  enabled: true
  url: http://localhost:8080/testhook
