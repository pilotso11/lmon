monitoring:
  # Global whitelist of containers allowed for restart operations
  # Only containers listed here can be restarted via API or healthcheck monitors
  allowedrestartcontainers:
    - web-app
    - api-server
    - worker
    - database
  disk:
    root:
      icon: hdd
      path: /
      threshold: 80
      # alertthreshold: 1  # Optional: Number of consecutive failures before triggering alert (default: 1)
      # maintenance:        # Optional: Scheduled maintenance window (pauses monitoring)
      #   cron: "0 3 * * *" # Cron expression (5-field), e.g. daily at 3 AM
      #   duration: 300     # Duration in seconds to pause monitoring
    home:
      icon: hdd
      path: /home
      threshold: 80
      # alertthreshold: 3  # Example: Wait for 3 consecutive failures before alerting
  healthcheck:
    google:
      icon: activity
      timeout: 10
      url: https://google.com
      # alertthreshold: 2  # Optional: Number of consecutive failures before triggering alert (default: 1)
      # maintenance:
      #   cron: "0 */4 * * *"  # Every 4 hours
      #   duration: 60          # 1 minute
    local:
      icon: heart-pulse
      timeout: 10
      url: http://localhost:8080/healthz
  docker:
    app_containers:
      icon: box
      containers: "web-app, api-server, worker"
      threshold: 5
      # alertthreshold: 1  # Optional: Number of consecutive failures before triggering alert (default: 1)
  interval: 60
  system:
    cpu:
      icon: cpu
      threshold: 85
      # alertthreshold: 1  # Optional: Number of consecutive failures before triggering alert (default: 1)
    memory:
      icon: speedometer
      threshold: 85
      # alertthreshold: 2  # Example: Wait for 2 consecutive failures before alerting
    title: lmon Dashboard
web:
  host: 0.0.0.0
  port: 8080
webhook:
  enabled: true
  url: http://localhost:8080/testhook
