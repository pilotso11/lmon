apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lmon-node
  namespace: lmon
  labels:
    app.kubernetes.io/name: lmon
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lmon-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lmon-node
        app.kubernetes.io/component: node
    spec:
      serviceAccountName: lmon-node
      hostPID: true
      containers:
        - name: lmon
          image: lmon:latest
          env:
            - name: LMON_MODE
              value: "node"
            - name: LMON_CONFIG_FILE
              value: /etc/lmon/config.yaml
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/lmon
              readOnly: true
            - name: hostroot
              mountPath: /hostroot
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: lmon-node-config
        - name: hostroot
          hostPath:
            path: /
            type: Directory
        - name: proc
          hostPath:
            path: /proc
            type: Directory
      tolerations:
        - operator: Exists
          effect: NoSchedule
