monitoring:
    interval: 60
    disk:
        - threshold: 80
          icon: storage
          path: /
    system:
        cpu:
            threshold: 90
            icon: cpu
        memory:
            threshold: 90
            icon: speedometer
    healthchecks: []
web:
    host: updated-host
    port: 9090
webhook:
    enabled: false
    url: ""
