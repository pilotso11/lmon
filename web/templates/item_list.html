{{ define "itemList" }} {{ if not . }}
<div class="text-center">No items to display</div>
{{ else }}
<div class="list-group">
    {{ range . }}
    <div
            class="list-group-item item-row item-container"
            data-id="{{ .ID }}"
            role="listitem"
            aria-label="Status for {{ .DisplayName }}"
    >
        <div class="d-flex justify-content-between align-items-start">
            <div class="item-status">
                <span style="display: inline-block">
                    <i
                            class="bi bi-{{ .Icon }} item-icon"
                            aria-hidden="true"
                    ></i>
                </span>
                <span
                        class="status-indicator {{ .StatusClass }}"
                        aria-label="Status: {{ .Status }}"
                ></span>
            </div>
            <div class="item-stack">
                <div class="item-detail1">
                    <span aria-label="Name">{{ .DisplayName }}</span>
                    <span
                            class="badge {{ .StatusClass }}"
                            aria-label="Status badge: {{ .Status }}"
                    >{{ .Status }}</span
                    >
                    <span class="ms-2" aria-label="Value">{{ .Value }}</span>
                </div>
                <div class="item-detail2">
                    <span class="ms-2" aria-label="Secondary value"
                    >{{ .Value2 }}</span
                    >
                </div>
            </div>
        </div>
    </div>
    {{ end }}
</div>
{{ end }} {{ end }}
