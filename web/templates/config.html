<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ .title }}</title>
    <link
            rel="icon"
            type="image/png"
            sizes="64x64"
            href="/static/icon-64x64.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/static/icon-32x32.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="128x128"
            href="/static/icon-128x128.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="256x256"
            href="/static/icon-256x256.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/static/icon-512x512.png"
    />
    <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/static/apple-touch-icon.png"
    />
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg"/>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
            rel="stylesheet"
    />
    <style>
        .card {
            margin-bottom: 20px;
        }

        .card-header {
            font-weight: bold;
        }

        .item-icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .config-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .config-item:hover {
            background-color: #f8f9fa;
        }

        .delete-btn {
            color: #dc3545;
            cursor: pointer;
        }

        /* Responsive font size for navbar-brand on small screens */
        @media (max-width: 575.98px) {
            .navbar-brand {
                font-size: 1rem; /* Reduce font size on small screens */
            }
        }
    </style>
    <script>
        const default_health_icon = "{{ .default_health_icon }}"
        const default_disk_icon = "{{ .default_disk_icon }}"
    </script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-graph-up"></i>
            lmon - Lightweight Monitoring
        </a>
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/mobile">Mobile View</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/config">Configuration</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Configuration</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">System Monitoring</div>
                <div class="card-body">
                    <div id="system-config-items"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Webhook</div>
                <div class="card-body">
                    <div id="webhook-config"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Disk Monitoring</div>
                <div class="card-body">
                    <div id="disk-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Disk Monitor</h5>
                    <form id="add-disk-form">
                        <div class="mb-3">
                            <label for="disk-name" class="form-label"
                                >Name (ID)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-name"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="disk-path" class="form-label"
                                >Path</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-path"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label
                                for="disk-threshold"
                                class="form-label"
                                >Threshold (%)</label
                            >
                            <input
                                type="number"
                                class="form-control"
                                id="disk-threshold"
                                min="1"
                                max="100"
                                value="80"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="disk-icon" class="form-label"
                                >Icon (Bootstrap Icon name)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-icon"
                                value="{{ .default_disk_icon }}"
                            />
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Disk Monitor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Health Checks</div>
                <div class="card-body">
                    <div id="health-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Health Check</h5>
                    <form id="add-health-form">
                        <div class="mb-3">
                            <label for="health-name" class="form-label"
                                >Name (ID)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="health-name"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="health-url" class="form-label"
                                >URL</label
                            >
                            <input
                                type="url"
                                class="form-control"
                                id="health-url"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label
                                for="health-timeout"
                                class="form-label"
                                >Timeout (seconds)</label
                            >
                            <input
                                type="number"
                                class="form-control"
                                id="health-timeout"
                                min="1"
                                value="10"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="health-icon" class="form-label"
                                >Icon (Bootstrap Icon name)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="health-icon"
                                value="{{ .default_health_icon }}"
                            />
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Health Check
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
        </div>
    </div>
</div>
</div>

<!-- Success/Error Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div
            id="toast"
            class="toast"
            role="alert"
            aria-live="assertive"
            aria-atomic="true"
    >
        <div class="toast-header">
            <strong class="me-auto" id="toast-title"
            >Notification</strong
            >
            <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="toast"
                    aria-label="Close"
            ></button>
        </div>
        <div class="toast-body" id="toast-message">
            <!-- Message will be set by JavaScript -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/config.js"></script>
</body>
</html>
