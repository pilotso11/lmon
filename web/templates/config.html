<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ .title }}</title>
    <link
            rel="icon"
            type="image/png"
            sizes="64x64"
            href="/static/icon-64x64.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/static/icon-32x32.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="128x128"
            href="/static/icon-128x128.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="256x256"
            href="/static/icon-256x256.png"
    />
    <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/static/icon-512x512.png"
    />
    <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/static/apple-touch-icon.png"
    />
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg"/>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"

    <link

    <style>
        .card {
            margin-bottom: 20px;
        }

        .card-header {
            font-weight: bold;
        }

        .item-icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .config-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .config-item:hover {
            background-color: #f8f9fa;
        }

        .delete-btn {
            color: #dc3545;
            cursor: pointer;
        }

        /* Responsive font size for navbar-brand on small screens */
        @media (max-width: 575.98px) {
            .navbar-brand {
                font-size: 1rem; /* Reduce font size on small screens */
            }
        }
    </style>
    <script>
        const default_health_icon = "{{ .default_health_icon }}"
        const default_disk_icon = "{{ .default_disk_icon }}"
    </script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-graph-up"></i>
            lmon - Lightweight Monitoring
        </a>
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/mobile">Mobile View</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/config">Configuration</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Configuration</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">System Monitoring</div>
                <div class="card-body">
                    <div id="system-config-items"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Webhook</div>
                <div class="card-body">
                    <div id="webhook-config"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Disk Monitoring</div>
                <div class="card-body">
                    <div id="disk-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Disk Monitor</h5>
                    <form id="add-disk-form">
                        <div class="mb-3">
                            <label for="disk-name" class="form-label"
                                >Name (ID)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-name"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="disk-path" class="form-label"
                                >Path</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-path"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label
                                for="disk-threshold"
                                class="form-label"
                                >Threshold (%)</label
                            >
                            <input
                                type="number"
                                class="form-control"
                                id="disk-threshold"
                                min="1"
                                max="100"
                                value="80"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="disk-icon" class="form-label"
                                >Icon (Bootstrap Icon name)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="disk-icon"
                                value="{{ .default_disk_icon }}"
                            />
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Disk Monitor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Health Checks</div>
                <div class="card-body">
                    <div id="health-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Health Check</h5>
                    <form id="add-health-form">
                        <div class="mb-3">
                            <label for="health-name" class="form-label"
                                >Name (ID)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="health-name"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="health-url" class="form-label"
                                >URL</label
                            >
                            <input
                                type="url"
                                class="form-control"
                                id="health-url"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label
                                for="health-timeout"
                                class="form-label"
                                >Timeout (seconds)</label
                            >
                            <input
                                type="number"
                                class="form-control"
                                id="health-timeout"
                                min="1"
                                value="10"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="health-icon" class="form-label"
                                >Icon (Bootstrap Icon name)</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="health-icon"
                                value="{{ .default_health_icon }}"
                            />
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Health Check
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
        </div>
    </div>
</div>
</div>

<!-- Success/Error Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div
            id="toast"
            class="toast"
            role="alert"
            aria-live="assertive"
            aria-atomic="true"
    >
        <div class="toast-header">
            <strong class="me-auto" id="toast-title"
            >Notification</strong
            >
            <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="toast"
                    aria-label="Close"
            ></button>
        </div>
        <div class="toast-body" id="toast-message">
            <!-- Message will be set by JavaScript -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Function to show toast notification
    function showToast(title, message, isError = false) {
        const toastEl = document.getElementById("toast")
        const toastTitle = document.getElementById("toast-title")
        const toastMessage = document.getElementById("toast-message")

        toastTitle.textContent = title
        toastMessage.textContent = message

        if (isError) {
            toastEl.classList.add("bg-danger", "text-white")
        } else {
            toastEl.classList.remove("bg-danger", "text-white")
        }

        const toast = new bootstrap.Toast(toastEl)
        toast.show()
    }

    // Function to load configuration
    function loadConfig() {
        fetch("/api/config")
            .then((response) => {
                if (!response.ok) {
                    throw new Error("Failed to load configuration")
                }
                const contentType =
                    response.headers.get("content-type") || ""
                if (contentType.includes("application/json")) {
                    return response.json()
                } else {
                    return response.text()
                }
            })
            .then((config) => {
                // Render disk config items
                // Convert disk map to array of {name, ...props}
                window.diskArray = Object.entries(
                    config.Monitoring.Disk || {},
                ).map(([name, props]) => ({
                    name,
                    ...props,
                }))
                renderDiskConfig(window.diskArray)

                // Render system config (passing web config for dashboard title)
                // Set the global interval value for inline edit
                window.lastLoadedInterval = config.Monitoring.Interval || 60
                renderSystemConfig(
                    config.Monitoring.System,
                    config.Web,
                )


                // Render health check config items
                // Convert healthcheck map to array of {name, ...props}
                window.healthArray = Object.entries(
                    config.Monitoring.Healthcheck || {},
                ).map(([name, props]) => ({
                    name,
                    ...props,
                }))
                renderHealthConfig(window.healthArray)

                // Render webhook config
                renderWebhookConfig(config.Webhook)
            })
            .catch((error) => {
                console.error("Error loading configuration:", error)
                showToast(
                    "Error",
                    "Failed to load configuration",
                    true,
                )
            })
    }

    // Function to render disk config items
    function renderDiskConfig(diskItems) {
        if (!diskItems || diskItems.length === 0) {
            document.getElementById("disk-config-items").innerHTML =
                '<div class="text-center">No disk monitors configured</div>'
            return
        }

        let html = ""

        diskItems.forEach((item) => {
            html += `
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-${item.Icon || default_disk_icon} item-icon"></i>
                                <strong>${item.name} (${item.Path || "(no path)"})</strong>
                            </div>
                            <div>
                                <span>Threshold: ${
                item.Threshold !== undefined &&
                item.Threshold !== null
                    ? parseFloat(item.Threshold).toFixed(2)
                    : "N/A"
            }%</span>
                                <i class="bi bi-trash delete-btn ms-2" data-type="disk" data-id="${item.name}"></i>
                            </div>
                        </div>
                    </div>
                `
        })

        document.getElementById("disk-config-items").innerHTML = html

        // Add delete event listeners
        document
            .querySelectorAll('.delete-btn[data-type="disk"]')
            .forEach((btn) => {
                btn.addEventListener("click", function () {
                    const id = this.getAttribute("data-id")
                    // Find disk details for confirmation
                    const disk = (
                        typeof window.diskArray !== "undefined"
                            ? window.diskArray
                            : []
                    ).find((d) => d.name === id)
                    let detail = id
                    if (disk) {
                        detail = `${disk.name} (${disk.Path || ""})`
                    }
                    deleteMonitor("disk", id, detail)
                })
            })
    }

    // Function to render system config
    function renderSystemConfig(systemConfig, webConfig) {
        if (!systemConfig) {
            document.getElementById("system-config-items").innerHTML =
                '<div class="text-center">No system monitoring configured</div>'
            return
        }

        // Access the nested CPU and Memory objects (capitalized for backend JSON)
        const cpuConfig = systemConfig.CPU || {}
        const memoryConfig = systemConfig.Memory || {}

        document.getElementById("system-config-items").innerHTML = `
                <form id="inline-system-form">
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-${cpuConfig.Icon || "cpu"} item-icon"></i>
                                <strong>CPU Monitoring</strong>
                            </div>
                            <div>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="cpu-threshold-inline"
                                    min="1"
                                    max="100"
                                    style="width: 100px; display: inline-block;"
                                    value="${cpuConfig.Threshold !== undefined && cpuConfig.Threshold !== null ? cpuConfig.Threshold : ""}"
                                    required
                                />
                                <span class="ms-2">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-${memoryConfig.Icon || "speedometer"} item-icon"></i>
                                <strong>Memory Monitoring</strong>
                            </div>
                            <div>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="memory-threshold-inline"
                                    min="1"
                                    max="100"
                                    style="width: 100px; display: inline-block;"
                                    value="${memoryConfig.Threshold !== undefined && memoryConfig.Threshold !== null ? memoryConfig.Threshold : ""}"
                                    required
                                />
                                <span class="ms-2">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-clock-history item-icon"></i>
                                <strong>Refresh Interval</strong>
                            </div>
                            <div>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="refresh-interval-inline"
                                    min="1"
                                    style="width: 100px; display: inline-block;"
                                    value="${window.lastLoadedInterval !== undefined ? window.lastLoadedInterval : ''}"
                                    required
                                />
                                <span class="ms-2">seconds</span>
                            </div>
                        </div>
                    </div>
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-gear item-icon"></i>
                                <strong>Dashboard Title</strong>
                            </div>
                            <div>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="dashboard-title-inline"
                                    style="width: 250px; display: inline-block;"
                                    value="${systemConfig.Title || "Monitoring Dashboard"}"
                                    required
                                />
                            </div>
                        </div>
                    </div>
                    <div class="text-end mt-2">
                        <button id="save-system-inline-btn" class="btn btn-primary">Save</button>
                    </div>
                </form>
            `

        // Set form values for refresh interval (for inline edit)
        window.lastLoadedInterval = (typeof config !== "undefined" && config.Monitoring && config.Monitoring.Interval) ? config.Monitoring.Interval : 60

        // Add submit handler for inline system form
        const inlineForm = document.getElementById("inline-system-form")
        if (inlineForm) {
            inlineForm.addEventListener("submit", function (e) {
                e.preventDefault()
                const cpuThreshold = parseInt(document.getElementById("cpu-threshold-inline").value, 10)
                const memThreshold = parseInt(document.getElementById("memory-threshold-inline").value, 10)
                const interval = parseInt(document.getElementById("refresh-interval-inline").value, 10)
                const dashboardTitle = document.getElementById("dashboard-title-inline").value

                if (
                    isNaN(cpuThreshold) ||
                    isNaN(memThreshold) ||
                    isNaN(interval) ||
                    !dashboardTitle
                ) {
                    showToast("Error", "Please fill out all system settings.", true)
                    return
                }

                // Save system thresholds and title
                fetch("/api/config/system", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        CPU: {Threshold: cpuThreshold, Icon: cpuConfig.Icon || "cpu"},
                        Memory: {Threshold: memThreshold, Icon: memoryConfig.Icon || "speedometer"},
                        Title: dashboardTitle,
                    }),
                })
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error("Failed to update system settings")
                        }
                        const contentType = response.headers.get("content-type") || ""
                        if (contentType.includes("application/json")) {
                            return response.json()
                        } else {
                            return response.text()
                        }
                    })
                    .then(() => {
                        // Save interval separately
                        return fetch("/api/config/interval", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({Interval: interval}),
                        })
                    })
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error("Failed to update refresh interval")
                        }
                        showToast("Success", "System settings updated")
                        loadConfig()
                    })
                    .catch((error) => {
                        showToast("Error", error.message || "Failed to update system settings", true)
                        console.error("Error updating system settings:", error)
                    })
            })
        }
    }

    // Function to render health check config items
    function renderHealthConfig(healthItems) {
        if (!healthItems || healthItems.length === 0) {
            document.getElementById("health-config-items").innerHTML =
                '<div class="text-center">No health checks configured</div>'
            return
        }

        let html = ""

        healthItems.forEach((item) => {
            html += `
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-${item.icon || default_health_icon} item-icon"></i>
                                <strong>${item.name}</strong>
                            </div>
                            <div>
                                <i class="bi bi-trash delete-btn" data-type="healthcheck" data-id="${item.name}"></i>
                            </div>
                        </div>
                        <div class="mt-2">
                            <small class="text-muted">${item.URL}</small>
                        </div>
                    </div>
                `
        })

        document.getElementById("health-config-items").innerHTML = html

        // Add delete event listeners
        document
            .querySelectorAll('.delete-btn[data-type="healthcheck"]')
            .forEach((btn) => {
                btn.addEventListener("click", function () {
                    const id = this.getAttribute("data-id")
                    // Find healthcheck details for confirmation
                    const health = (
                        typeof window.healthArray !== "undefined"
                            ? window.healthArray
                            : []
                    ).find((h) => h.name === id)
                    let detail = id
                    if (health) {
                        detail = `${health.name} (${health.URL || ""})`
                    }
                    deleteMonitor("healthcheck", id, detail)
                })
            })
    }

    // Function to render webhook config
    function renderWebhookConfig(webhookConfig) {
        if (!webhookConfig) {
            document.getElementById("webhook-config").innerHTML =
                '<div class="text-center">No webhook configured</div>'
            return
        }

        // Inline edit form for webhook
        document.getElementById("webhook-config").innerHTML = `
                <form id="webhook-inline-form">
                    <div class="config-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-bell item-icon"></i>
                                <strong>Webhook Notifications</strong>
                            </div>
                            <div>
                                <span class="badge ${webhookConfig.Enabled ? "bg-success" : "bg-secondary"}">
                                    ${webhookConfig.Enabled ? "Enabled" : "Disabled"}
                                </span>
                            </div>
                        </div>
                        <div class="mt-2">
                            <input
                                type="text"
                                class="form-control"
                                id="webhook-url-inline"
                                placeholder="Webhook URL"
                                value="${webhookConfig.URL || ""}"
                                style="width: 350px; display: inline-block;"
                                required
                            />
                        </div>
                        <div class="mt-2 text-end">
                            ${
            webhookConfig.Enabled
                ? `<button id="webhook-update-btn" class="btn btn-primary me-2" type="submit">Update Webhook</button>
                   <button id="webhook-disable-btn" class="btn btn-secondary" type="button">Disable Webhook</button>`
                : `<button id="webhook-enable-btn" class="btn btn-primary" type="submit">Enable Webhook</button>`
        }
                        </div>
                    </div>
                </form>
                `

        // Add event listeners for inline webhook form
        const webhookForm = document.getElementById("webhook-inline-form")
        const webhookUrlInput = document.getElementById("webhook-url-inline")
        const updateBtn = document.getElementById("webhook-update-btn") || document.getElementById("webhook-enable-btn")
        const disableBtn = document.getElementById("webhook-disable-btn")

        function setWebhookLoading(isLoading) {
            if (updateBtn) updateBtn.disabled = isLoading
            if (disableBtn) disableBtn.disabled = isLoading
            if (webhookUrlInput) webhookUrlInput.disabled = isLoading
        }

        if (webhookForm) {
            webhookForm.addEventListener("submit", function (e) {
                e.preventDefault()
                const url = webhookUrlInput.value.trim()
                if (!url) {
                    showToast("Error", "Webhook URL is required", true)
                    return
                }
                setWebhookLoading(true)
                fetch("/api/config/webhook", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        enabled: true,
                        url: url,
                    }),
                })
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error("Failed to update webhook")
                        }
                        const contentType = response.headers.get("content-type") || ""
                        if (contentType.includes("application/json")) {
                            return response.json()
                        } else {
                            return response.text()
                        }
                    })
                    .then(() => {
                        showToast("Success", webhookConfig.enabled ? "Webhook updated" : "Webhook enabled")
                        // Wait a short moment to ensure backend is updated before reloading config
                        setTimeout(() => {
                            loadConfig()
                            setWebhookLoading(false)
                        }, 300)
                    })
                    .catch((error) => {
                        setWebhookLoading(false)
                        showToast("Error", error.message || "Failed to update webhook", true)
                        console.error("Error updating webhook:", error)
                    })
            })
        }
        // Disable webhook button
        if (disableBtn) {
            disableBtn.addEventListener("click", function () {
                const url = webhookUrlInput.value.trim()
                setWebhookLoading(true)
                fetch("/api/config/webhook", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        enabled: false,
                        url: url,
                    }),
                })
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error("Failed to disable webhook")
                        }
                        const contentType = response.headers.get("content-type") || ""
                        if (contentType.includes("application/json")) {
                            return response.json()
                        } else {
                            return response.text()
                        }
                    })
                    .then(() => {
                        showToast("Success", "Webhook disabled")
                        setTimeout(() => {
                            loadConfig()
                            setWebhookLoading(false)
                        }, 300)
                    })
                    .catch((error) => {
                        setWebhookLoading(false)
                        showToast("Error", error.message || "Failed to disable webhook", true)
                        console.error("Error disabling webhook:", error)
                    })
            })
        }
    }

    // Function to delete a monitor
    function deleteMonitor(type, id, detail) {
        const msg = detail
            ? `Are you sure you want to delete this ${type} monitor: ${detail}?`
            : `Are you sure you want to delete this ${type} monitor?`
        if (!confirm(msg)) {
            return
        }

        fetch(`/api/config/${type}/${id}`, {
            method: "DELETE",
        })
            .then((response) => {
                if (!response.ok) {
                    throw new Error(`Failed to delete ${type} monitor`)
                }
                const contentType =
                    response.headers.get("content-type") || ""
                if (contentType.includes("application/json")) {
                    return response.json()
                } else {
                    return response.text()
                }
            })
            .then((data) => {
                showToast("Success", data.message)
                loadConfig()
            })
            .catch((error) => {
                console.error("Error deleting monitor:", error)
                showToast(
                    "Error",
                    `Failed to delete ${type} monitor`,
                    true,
                )
            })
    }

    // Document ready
    document.addEventListener("DOMContentLoaded", function () {
        // Load configuration
        loadConfig()

        // Add disk form submission
        const addDiskForm = document.getElementById("add-disk-form")
        if (addDiskForm) {
            addDiskForm.addEventListener("submit", function (e) {
                e.preventDefault()

                const diskName = document
                    .getElementById("disk-name")
                    .value.trim()
                const diskPath = document
                    .getElementById("disk-path")
                    .value.trim()
                const diskIcon = document
                    .getElementById("disk-icon")
                    .value.trim()
                const diskThreshold = parseInt(
                    document.getElementById("disk-threshold").value,
                )

                if (!diskName) {
                    showToast("Error", "Disk name is required", true)
                    return
                }

                const diskConfig = {
                    path: diskPath,
                    icon: diskIcon,
                    threshold: diskThreshold,
                }

                console.log("Submitting diskConfig:", diskConfig)

                // diskConfig must have a name property for the ID
                fetch(
                    `/api/config/disk/${encodeURIComponent(diskName)}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(diskConfig),
                    },
                )
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error(
                                "Failed to add disk monitor",
                            )
                        }
                        // Try to parse JSON, but fallback to text for "OK\n"
                        const contentType =
                            response.headers.get("content-type") || ""
                        if (contentType.includes("application/json")) {
                            return response.json()
                        } else {
                            return response.text()
                        }
                    })
                    .then((data) => {
                        showToast("Success", "Disk monitor added")
                        loadConfig()
                        document
                            .getElementById("add-disk-form")
                            .reset()
                    })
                    .catch((error) => {
                        console.error(
                            "Error adding disk monitor:",
                            error,
                        )
                        showToast(
                            "Error",
                            "Failed to add disk monitor",
                            true,
                        )
                    })
            })

            // Add health check form submission
            const addHealthForm = document.getElementById("add-health-form");
            if (addHealthForm) {
                addHealthForm.addEventListener("submit", function (e) {
                    e.preventDefault();

                    const healthNameInput = document.getElementById("health-name");
                    const healthUrlInput = document.getElementById("health-url");
                    const healthTimeoutInput = document.getElementById("health-timeout");
                    const healthIconInput = document.getElementById("health-icon");
                    if (!healthNameInput || !healthUrlInput || !healthTimeoutInput || !healthIconInput) {
                        showToast("Error", "Healthcheck form fields missing", true);
                        return;
                    }

                    const healthConfig = {
                        name: healthNameInput.value,
                        url: healthUrlInput.value,
                        timeout: parseInt(healthTimeoutInput.value),
                        icon: healthIconInput.value,
                    };

                    // healthConfig must have a name property for the ID
                    fetch(
                        `/api/config/healthcheck/${encodeURIComponent(healthConfig.name)}`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                url: healthConfig.url,
                                icon: healthConfig.icon,
                                timeout: parseInt(healthConfig.timeout),
                            }),
                        },
                    )
                        .then((response) => {
                            if (!response.ok) {
                                throw new Error(
                                    "Failed to add health check",
                                );
                            }
                            const contentType =
                                response.headers.get("content-type") || "";
                            if (contentType.includes("application/json")) {
                                return response.json();
                            } else {
                                return response.text();
                            }
                        })
                        .then((data) => {
                            showToast("Success", data.message);
                            loadConfig();
                            if (addHealthForm) addHealthForm.reset();
                        })
                        .catch((error) => {
                            console.error(
                                "Error adding health check:",
                                error,
                            );
                            showToast(
                                "Error",
                                "Failed to add health check",
                                true,
                            );
                        });
                });
            }
        }
    })



</script>
</body>
</html>
