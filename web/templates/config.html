<!doctype html>
<html lang="en">
{{ template "header" . }}
<body>
{{ template "nav" . }}

<div class="container mt-4">
    <h1 class="mb-4">Configuration</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                {{ template "config-system-monitoring" . }}
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                {{ template "config-webhook" . }}

            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Disk Monitoring</div>
                <div class="card-body">
                    <div id="disk-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Disk Monitor</h5>
                    <form id="add-disk-form">
                        <div class="row align-items-center mb-2">
                            <label for="disk-name" class="col-sm-4 col-form-label">Name (ID)</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" id="disk-name" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="disk-path" class="col-sm-4 col-form-label">Path</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" id="disk-path" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="disk-threshold" class="col-sm-4 col-form-label">Threshold (%)</label>
                            <div class="col-sm-8">
                                <input type="number" class="form-control" id="disk-threshold" min="1" max="100" value="80" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="disk-icon-dropdown" class="col-sm-4 col-form-label">Icon</label>
                            <div class="col-sm-8">
                                <div id="disk-icon-dropdown"></div>
                            </div>
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Disk Monitor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Health Checks</div>
                <div class="card-body">
                    <div id="health-config-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden"
                                    >Loading...</span
                                >
                            </div>
                        </div>
                    </div>
                    <hr />
                    <h5>Add Health Check</h5>
                    <form id="add-health-form">
                        <div class="row align-items-center mb-2">
                            <label for="health-name" class="col-sm-4 col-form-label">Name (ID)</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" id="health-name" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="health-url" class="col-sm-4 col-form-label">URL</label>
                            <div class="col-sm-8">
                                <input type="url" class="form-control" id="health-url" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="health-timeout" class="col-sm-4 col-form-label">Timeout (seconds)</label>
                            <div class="col-sm-8">
                                <input type="number" class="form-control" id="health-timeout" min="1" value="10" required />
                            </div>
                        </div>
                        <div class="row align-items-center mb-2">
                            <label for="health-icon-dropdown" class="col-sm-4 col-form-label">Icon</label>
                            <div class="col-sm-8">
                                <div id="health-icon-dropdown"></div>
                            </div>
                        </div>
                        <div class="text-end mt-2">
                            <button type="submit" class="btn btn-primary">
                                Add Health Check
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
        </div>
    </div>
</div>
</div>

<!-- Success/Error Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div
            id="toast"
            class="toast"
            role="alert"
            aria-live="assertive"
            aria-atomic="true"
    >
        <div class="toast-header">
            <strong class="me-auto" id="toast-title"
            >Notification</strong
            >
            <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="toast"
                    aria-label="Close"
            ></button>
        </div>
        <div class="toast-body" id="toast-message">
            <!-- Message will be set by JavaScript -->
        </div>
    </div>
</div>

{{ template "footer" . }}
<!-- Your config.js (after everything else) -->
<script type="module" src="/static/js/config.js"></script>
</body>
</html>
