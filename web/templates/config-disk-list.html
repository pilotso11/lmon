{{ define "config-disk-list" }}
<div class="card-header">Disk Monitoring</div>
<div class="card-body">
    <!-- TODO: Verify aria tags for accessibility on delete buttons -->
    <div id="disk-config-items">
        {{ if .Config.Monitoring.Disk }} {{ range $id, $disk :=
        .Config.Monitoring.Disk }}
        <div class="config-item mb-3">
            <div class="d-flex align-items-center">
                <i class="bi bi-{{ $disk.Icon }} item-icon me-2"></i>
                <strong class="me-2">{{ $id }}</strong>
                <span class="me-2 text-muted"
                    >(<code>{{ $disk.Path }}</code>)</span
                >
                <span class="me-2">Threshold: {{ $disk.Threshold }}%</span>
                <button
                    type="button"
                    class="delete-disk-btn ms-auto p-0 btn btn-link"
                    style="color: #dc3545; border: none; background: none"
                    data-id="{{ $id }}"
                    data-group="disk"
                    data-detail="{{ $id }} ({{ $disk.Path }})"
                    title="Delete"
                >
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
        {{ end }} {{ else }}
        <div class="text-center text-muted">No disk monitors configured.</div>
        {{ end }}
    </div>
    <hr />
    <h5>Add Disk Monitor</h5>
    <form id="add-disk-form">
        <div class="row align-items-center mb-2">
            <label for="disk-name" class="col-sm-4 col-form-label"
                >Name (ID)</label
            >
            <div class="col-sm-8">
                <input
                    type="text"
                    class="form-control"
                    id="disk-name"
                    required
                />
            </div>
        </div>
        <div class="row align-items-center mb-2">
            <label for="disk-path" class="col-sm-4 col-form-label">Path</label>
            <div class="col-sm-8">
                <input
                    type="text"
                    class="form-control"
                    id="disk-path"
                    required
                />
            </div>
        </div>
        <div class="row align-items-center mb-2">
            <label for="disk-threshold" class="col-sm-4 col-form-label"
                >Threshold (%)</label
            >
            <div class="col-sm-8">
                <input
                    type="number"
                    class="form-control"
                    id="disk-threshold"
                    min="1"
                    max="100"
                    value="80"
                    required
                />
            </div>
        </div>
        <div class="row align-items-center mb-2">
            <label for="disk-icon-dropdown" class="col-sm-4 col-form-label"
                >Icon</label
            >
            <div class="col-sm-8">
                <div id="disk-icon-dropdown"></div>
            </div>
        </div>
        <div class="text-end mt-2">
            <button type="submit" class="btn btn-primary">
                Add Disk Monitor
            </button>
        </div>
    </form>
</div>
{{ end }}
