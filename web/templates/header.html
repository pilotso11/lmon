{{ define "header" }}
    <head>
        <meta charset="UTF-8</head>" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ .title }}</title>
        <link
            rel="icon"
            type="image/png"
            sizes="64x64"
            href="/static/icons/icon-64x64.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/static/icons/icon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="128x128"
            href="/static/icons/icon-128x128.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="256x256"
            href="/static/icons/icon-256x256.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/static/icons/icon-512x512.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/static/icons/apple-touch-icon.png"
        />
        <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg" />
        <link rel="manifest" href="/static/manifest.json" />
        <!-- bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- bootstrap icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <!-- bootstrap-select -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">
        <link href="/static/css/lmon.css" rel="stylesheet" />
        <script>
            const default_health_icon = "{{ .default_health_icon }}"
            const default_disk_icon = "{{ .default_disk_icon }}"
        </script>
    </head>
{{ end }}
