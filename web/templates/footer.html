{{ define "footer" }}

<div class="update-timestamp text-center">
    <span class="badge bg-secondary">Last Updated:</span>
    {{ .UpdateAt }}
</div>

{{ if eq .ActivePage "config" }}
<!-- jQuery (must be first) -- only on the config page -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
{{ end }}

<!-- Bootstrap JS (after jQuery) -- always -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{{ if eq .ActivePage "config" }}
<!-- bootstrap-select JS (after Bootstrap and jQuery) -- only on config page -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>
{{ end }}

<!-- Your config.js (after everything else) -->
<script src="/static/js/refresh.js"></script>

{{ end }}
