<!doctype html>
<!--suppress JSUnresolvedLibraryURL -->
<html lang="en">
    {{ template "header" . }}
    <body>
        {{ template "nav" . }}

        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>{{ .dashboard_title }}</h1>
                <button
                    id="refresh-btn"
                    class="btn btn-primary"
                    data-refresh-interval="{{ .refresh_interval }}"
                >
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                    <span id="refresh-countdown"></span>
                </button>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">System</div>
                        <div class="card-body" id="system-items">
                            {{ template "itemList" .SystemItems }}
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">Disk</div>
                        <div class="card-body" id="disk-items">
                            {{ template "itemList" .DiskItems }}
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">Health Checks</div>
                        <div class="card-body" id="health-items">
                            {{ template "itemList" .HealthItems }}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Item Detail Modal -->
        <div
            class="modal fade"
            id="itemDetailModal"
            tabindex="-1"
            aria-hidden="true"
        >
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-title">
                            Item Details
                        </h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="modal-body" id="modal-body">
                        <!-- Details will be populated by JavaScript -->
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            // Refresh button logic: reload the page
            document.addEventListener("DOMContentLoaded", function () {
                const refreshBtn = document.getElementById("refresh-btn");
                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function () {
                        window.location.reload();
                    });
                }
            });
        </script>
    </body>
</html>
