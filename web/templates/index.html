<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .status-ok {
            background-color: #28a745;
            color: white;
        }
        .status-warning {
            background-color: #ffc107;
            color: black;
        }
        .status-critical {
            background-color: #dc3545;
            color: white;
        }
        .status-unknown {
            background-color: #6c757d;
            color: white;
        }
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .card {
            margin-bottom: 20px;
        }
        .card-header {
            font-weight: bold;
        }
        .refresh-btn {
            margin-left: 10px;
        }
        .item-icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up"></i>
                lmon - Lightweight Monitoring
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/config">Configuration</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Monitoring Dashboard</h1>
            <button id="refresh-btn" class="btn btn-primary">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">System</div>
                    <div class="card-body" id="system-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Disk</div>
                    <div class="card-body" id="disk-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">Health Checks</div>
                    <div class="card-body" id="health-items">
                        <div class="text-center">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Item Detail Modal -->
    <div class="modal fade" id="itemDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Item Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Details will be populated by JavaScript -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to get status class
        function getStatusClass(status) {
            switch(status.toLowerCase()) {
                case 'ok': return 'status-ok';
                case 'warning': return 'status-warning';
                case 'critical': return 'status-critical';
                default: return 'status-unknown';
            }
        }

        // Function to get icon
        function getIcon(item) {
            if (item.icon) {
                return `<i class="bi bi-${item.icon} item-icon"></i>`;
            }

            // Default icons based on type
            switch(item.type) {
                case 'cpu': return '<i class="bi bi-cpu item-icon"></i>';
                case 'memory': return '<i class="bi bi-speedometer item-icon"></i>';
                case 'disk': return '<i class="bi bi-hdd item-icon"></i>';
                case 'health': return '<i class="bi bi-activity item-icon"></i>';
                default: return '<i class="bi bi-graph-up item-icon"></i>';
            }
        }

        // Function to load items
        function loadItems() {
            fetch('/api/items')
                .then(response => response.json())
                .then(items => {
                    const systemItems = items.filter(item => item.type === 'cpu' || item.type === 'memory');
                    const diskItems = items.filter(item => item.type === 'disk');
                    const healthItems = items.filter(item => item.type === 'health');

                    // Render system items
                    document.getElementById('system-items').innerHTML = renderItems(systemItems);

                    // Render disk items
                    document.getElementById('disk-items').innerHTML = renderItems(diskItems);

                    // Render health items
                    document.getElementById('health-items').innerHTML = renderItems(healthItems);

                    // Add click handlers for item details
                    document.querySelectorAll('.item-row').forEach(row => {
                        row.addEventListener('click', function() {
                            const itemId = this.getAttribute('data-id');
                            showItemDetails(itemId, items);
                        });
                    });
                })
                .catch(error => {
                    console.error('Error loading items:', error);
                    document.getElementById('system-items').innerHTML = '<div class="alert alert-danger">Error loading system items</div>';
                    document.getElementById('disk-items').innerHTML = '<div class="alert alert-danger">Error loading disk items</div>';
                    document.getElementById('health-items').innerHTML = '<div class="alert alert-danger">Error loading health items</div>';
                });
        }

        // Function to render items
        function renderItems(items) {
            if (items.length === 0) {
                return '<div class="text-center">No items to display</div>';
            }

            let html = '<div class="list-group">';

            items.forEach(item => {
                const statusClass = getStatusClass(item.status);
                const icon = getIcon(item);

                // Determine if item should be expanded (if status is not OK)
                const expanded = item.status.toLowerCase() !== 'ok' ? 'show' : '';

                html += `
                    <div class="list-group-item item-row" data-id="${item.id}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span style="display: inline-block;">${icon}</span>
                                <span class="status-indicator ${statusClass}"></span>
                                ${item.name}
                            </div>
                            <div>
                                <span class="badge ${statusClass}">${item.status}</span>
                                <span class="ms-2">${item.unit === '%' ? parseFloat(item.value).toFixed(2) : item.value}${item.unit}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        // Function to show item details
        function showItemDetails(itemId, items) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;

            const statusClass = getStatusClass(item.status);
            const icon = getIcon(item);

            let html = `
                <div class="d-flex align-items-center mb-3">
                    ${icon}
                    <h4 class="mb-0">${item.name}</h4>
                </div>
                <div class="mb-3">
                    <span class="badge ${statusClass} fs-6">${item.status}</span>
                </div>
                <div class="mb-3">
                    <strong>Value:</strong> ${item.unit === '%' ? parseFloat(item.value).toFixed(2) : item.value}${item.unit}
                </div>
                <div class="mb-3">
                    <strong>Threshold:</strong> ${item.threshold}${item.unit}
                </div>
                <div class="mb-3">
                    <strong>Last Check:</strong> ${new Date(item.last_check).toLocaleString()}
                </div>
                <div class="mb-3">
                    <strong>Message:</strong> ${item.message}
                </div>
            `;

            document.getElementById('modal-title').textContent = item.name;
            document.getElementById('modal-body').innerHTML = html;

            const modal = new bootstrap.Modal(document.getElementById('itemDetailModal'));
            modal.show();
        }

        // Load items on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadItems();

            // Set up refresh button
            document.getElementById('refresh-btn').addEventListener('click', loadItems);

            // Auto-refresh every 60 seconds
            setInterval(loadItems, 60000);
        });
    </script>
</body>
</html>
