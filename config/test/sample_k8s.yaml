kubernetes:
    enabled: true
    in_cluster: false
    kubeconfig: /home/user/.kube/config
    namespace: default
monitoring:
    interval: 60
    k8sevents:
        default-events:
            alertthreshold: 1
            icon: lightning
            namespaces: default
            threshold: 5
            window: 300
    k8snodes:
        cluster-nodes:
            alertthreshold: 1
            icon: hdd-rack
    k8sservice:
        web-app:
            alertthreshold: 1
            health_path: /healthz
            icon: globe
            namespace: production
            port: 8080
            service: web-frontend
            threshold: 80
            timeout: 5
    system:
        cpu:
            alertthreshold: 1
            icon: cpu
            threshold: 90
        memory:
            alertthreshold: 1
            icon: speedometer
            threshold: 90
        title: LMON Dashboard
web:
    host: 0.0.0.0
    port: 8080
webhook:
    enabled: true
    url: http://localhost:8080/testhook
