monitoring:
    disk:
        root:
            alertthreshold: 1
            icon: storage
            path: /
            threshold: 80
    healthcheck:
        test:
            alertthreshold: 1
            icon: test
            respcode: 200
            timeout: 10
            url: http://localhost:8080/test
    interval: 60
    system:
        cpu:
            alertthreshold: 1
            icon: cpu
            threshold: 90
        memory:
            alertthreshold: 1
            icon: speedometer
            threshold: 90
        title: LMON Dashboard
web:
    host: 0.0.0.0
    port: 8080
webhook:
    enabled: true
    url: http://localhost:8080/testhook
