monitoring:
    interval: 60
    ping:
        ping_sample:
            address: 8.8.8.8
            alertthreshold: 1
            amberthreshold: 100
            icon: wifi
            timeout: 1000
    system:
        cpu:
            alertthreshold: 1
            icon: cpu
            threshold: 90
        memory:
            alertthreshold: 1
            icon: speedometer
            threshold: 90
        title: LMON Dashboard
web:
    host: 0.0.0.0
    port: 8080
webhook:
    enabled: true
    url: http://localhost:8080/testhook
