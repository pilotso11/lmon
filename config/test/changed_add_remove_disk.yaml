monitoring:
    disk:
        test:
            icon: test
            path: /test
            threshold: 75
    healthcheck:
        self:
            icon: activity
            timeout: 5
            url: http://localhost:8080/healthz
    interval: 60
    system:
        cpu:
            icon: cpu
            threshold: 90
        memory:
            icon: speedometer
            threshold: 90
        title: LMON Dashboard
web:
    host: 0.0.0.0
    port: 8080
webhook:
    enabled: true
    url: http://localhost:8080/testhook
