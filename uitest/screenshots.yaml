monitoring:
  interval: 60
  disk:
    root:
      icon: hdd
      path: /
      threshold: 80
    home:
      icon: hdd
      path: /home
      threshold: 80
  healthcheck:
    google:
      icon: activity
      timeout: 10
      url: https://google.com
    local:
      icon: heart-pulse
      timeout: 10
      url: http://localhost:8080/healthz
  docker:
    apps:
      containers: web-server, api-server
      icon: box
      threshold: 5
  ping:
    cloudflare:
      url: 1.1.1.1
      icon: arrow-left-right
      timeout: 500
      amberthreshold: 200
  system:
    cpu:
      icon: cpu
      threshold: 85
    memory:
      icon: speedometer
      threshold: 85
    title: lmon Dashboard
web:
  host: 0.0.0.0
  port: 8080
webhook:
  enabled: true
  url: http://localhost:8080/testhook
